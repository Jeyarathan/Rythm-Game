<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FNF Rhythm Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    /* Responsive canvas scaling - maintains 900x750 aspect ratio */
    canvas {
      display: block;
      border: 2px solid #333;
      /* Use CSS transform to scale canvas to fit screen */
      /* Canvas internal resolution stays 900x750 for consistent gameplay */
      max-width: 100vw;
      max-height: 100vh;
      width: 900px;  /* Base width */
      height: 750px; /* Base height */
      /* Scale down if screen is smaller */
      image-rendering: pixelated; /* Crisp scaling for pixel-perfect graphics */
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
    /* Responsive scaling for smaller screens */
    @media (max-width: 920px) or (max-height: 770px) {
      canvas {
        width: auto;
        height: auto;
        /* Maintain aspect ratio while fitting to viewport */
        max-width: calc(100vw - 20px);
        max-height: calc(100vh - 20px);
      }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
